<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Studio — Edit & Export</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e14;
      --panel: #16161e;
      --panel2: #1c1c28;
      --border: #272738;
      --accent: #e8b44b;
      --accent2: #c4953a;
      --text: #cccce0;
      --dim: #6868a0;
      --canvas-bg: #1a1a26;
      --page-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.4);
    }
    html, body { height: 100%; font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); overflow: hidden; }
    .app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

    /* TOP BAR */
    .topbar {
      display: flex; align-items: center; gap: 12px; padding: 0 18px;
      background: var(--panel); border-bottom: 1px solid var(--border); z-index: 20;
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; color: var(--accent); letter-spacing: -0.5px; white-space: nowrap; }
    .logo em { color: var(--dim); font-style: normal; }
    .sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
    .file-name { font-size: 11px; color: var(--dim); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .spacer { flex: 1; }
    .page-info { font-size: 11px; color: var(--dim); white-space: nowrap; }
    .zoom-row { display: flex; align-items: center; gap: 5px; }
    .zoom-row button, .nav-btn {
      background: none; border: 1px solid var(--border); color: var(--text);
      border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer;
      padding: 4px 8px; height: 28px; display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s;
    }
    .zoom-row button:hover, .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .zoom-val { font-size: 11px; color: var(--dim); min-width: 38px; text-align: center; }
    .btn-dl {
      background: var(--accent); color: #111; border: none; padding: 0 16px; height: 32px;
      border-radius: 7px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s, transform .1s;
    }
    .btn-dl:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
    .btn-dl:disabled { opacity: .35; cursor: not-allowed; }

    /* WORKSPACE */
    .workspace { display: grid; grid-template-columns: 54px 1fr 188px; overflow: hidden; }

    /* TOOLBAR */
    .toolbar {
      background: var(--panel); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 2px; overflow-y: auto;
    }
    .tg { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 0 5px; width: 100%; }
    .tg + .tg { margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
    .tbtn {
      width: 44px; height: 44px; background: none; border: 1px solid transparent; border-radius: 8px;
      color: var(--dim); cursor: pointer; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2px; transition: all .12s; position: relative;
    }
    .tbtn svg { width: 17px; height: 17px; }
    .tbtn .k { font-size: 8px; line-height: 1; opacity: .5; }
    .tbtn:hover { background: rgba(255,255,255,.04); color: var(--text); border-color: var(--border); }
    .tbtn.on { background: rgba(232,180,75,.1); border-color: var(--accent); color: var(--accent); }
    .tbtn.on .k { opacity: .7; color: var(--accent); }
    .tbtn::after {
      content: attr(data-tip); position: absolute; left: 50px; top: 50%; transform: translateY(-50%);
      background: #252535; color: var(--text); font-size: 10px; padding: 4px 8px; border-radius: 5px;
      white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 200;
      border: 1px solid var(--border);
    }
    .tbtn:hover::after { opacity: 1; }

    /* CANVAS AREA */
    .canvas-area {
      background: var(--canvas-bg); overflow: auto; position: relative;
      background-image: radial-gradient(circle, #2a2a40 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .canvas-area::-webkit-scrollbar { width: 7px; height: 7px; }
    .canvas-area::-webkit-scrollbar-track { background: var(--bg); }
    .canvas-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* DROP ZONE */
    .drop-zone {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .drop-zone.gone { display: none; }
    .drop-icon {
      width: 88px; height: 88px; border: 2px dashed var(--border); border-radius: 18px;
      display: flex; align-items: center; justify-content: center; color: var(--dim);
      transition: all .2s;
    }
    .drop-zone:hover .drop-icon, .drop-zone.drag .drop-icon {
      border-color: var(--accent); color: var(--accent); background: rgba(232,180,75,.04);
    }
    .drop-h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
    .drop-p { font-size: 11px; color: var(--dim); text-align: center; line-height: 1.8; }
    .drop-p span { color: var(--accent); }
    .btn-up {
      background: var(--accent); color: #111; border: none; padding: 10px 22px;
      border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      cursor: pointer; margin-top: 4px; transition: background .15s;
    }
    .btn-up:hover { background: var(--accent2); }

    /* PAGES */
    .pages { display: flex; flex-direction: column; align-items: center; padding: 32px 32px; gap: 28px; }
    .pages.gone { display: none; }
    .page-wrap { position: relative; box-shadow: var(--page-shadow); border-radius: 3px; flex-shrink: 0; }
    .page-wrap canvas { display: block; position: absolute; top: 0; left: 0; }
    .page-wrap .pdf-c { background: #fff; }
    .page-label {
      position: absolute; bottom: -22px; left: 0; right: 0; text-align: center;
      font-size: 10px; color: var(--dim);
    }

    /* PROPS */
    .props {
      background: var(--panel); border-left: 1px solid var(--border);
      padding: 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px;
    }
    .props.muted { opacity: .4; pointer-events: none; }
    .props::-webkit-scrollbar { width: 4px; }
    .props::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .plabel { font-size: 8px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); margin-bottom: 6px; }
    .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 8px; }
    .cdot {
      width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all .12s;
    }
    .cdot:hover, .cdot.on { border-color: #fff; transform: scale(1.12); }
    .crow { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 4px; }
    .cname { font-size: 10px; color: var(--dim); }
    .swatch {
      width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--border);
      cursor: pointer; position: relative; overflow: hidden;
    }
    .swatch input { position: absolute; inset: -4px; opacity: 0; cursor: pointer; width: 200%; height: 200%; }
    input[type=range] { width: 100%; accent-color: var(--accent); }
    .rval { font-size: 10px; color: var(--dim); min-width: 28px; text-align: right; white-space: nowrap; }
    .rrow { display: flex; align-items: center; gap: 6px; }
    .guide { font-size: 10px; color: var(--dim); line-height: 2; }
    .guide span { color: var(--accent); }
    .psec { display: flex; flex-direction: column; }

    /* CURSOR modes */
    .ac.tool-pen { cursor: crosshair; }
    .ac.tool-text { cursor: text; }
    .ac.tool-highlight { cursor: crosshair; }
    .ac.tool-rect { cursor: crosshair; }
    .ac.tool-eraser { cursor: cell; }
    .ac.tool-select { cursor: default; }

    /* OVERLAY TEXT INPUT */
    .tinput {
      position: fixed; z-index: 500; border: 1px solid var(--accent);
      outline: none; resize: both; overflow: hidden; background: rgba(20,20,30,.08);
      font-family: 'DM Mono', monospace; padding: 2px 4px; min-width: 80px; min-height: 24px;
      color: inherit;
    }

    /* LOADING */
    .load-wrap {
      position: fixed; inset: 0; background: rgba(14,14,20,.88);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; z-index: 900;
    }
    .load-wrap.gone { display: none; }
    .spin {
      width: 34px; height: 34px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-msg { font-size: 11px; color: var(--dim); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(60px);
      background: var(--panel2); border: 1px solid var(--border); color: var(--text);
      padding: 9px 18px; border-radius: 8px; font-size: 11px; transition: transform .25s ease; z-index: 1000;
    }
    .toast.up { transform: translateX(-50%) translateY(0); }

    /* UNDO INDICATOR */
    .undo-pill {
      position: fixed; top: 62px; left: 50%; transform: translateX(-50%) translateY(-40px);
      background: var(--panel2); border: 1px solid var(--border); color: var(--dim);
      padding: 5px 14px; border-radius: 20px; font-size: 10px;
      transition: transform .2s; z-index: 800; pointer-events: none;
    }
    .undo-pill.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">PDF<em>Studio</em></div>
    <div class="sep"></div>
    <div class="file-name" id="fileName">No file loaded</div>
    <div class="spacer"></div>
    <div class="page-info" id="pageInfo" style="display:none"></div>
    <div class="sep"></div>
    <div class="zoom-row">
      <button onclick="zoom(-0.25)" title="Zoom out">−</button>
      <span class="zoom-val" id="zoomVal">100%</span>
      <button onclick="zoom(0.25)" title="Zoom in">+</button>
      <button onclick="setZoom(1)">fit</button>
    </div>
    <div class="sep"></div>
    <button class="btn-dl" id="btnDl" onclick="doDownload()" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export PDF
    </button>
  </div>

  <!-- WORKSPACE -->
  <div class="workspace">
    <!-- TOOL BAR -->
    <div class="toolbar">
      <div class="tg">
        <button class="tbtn on" data-tool="select" data-tip="Select  V" onclick="setTool('select')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-7 1-3 7z"/></svg>
          <span class="k">V</span>
        </button>
      </div>
      <div class="tg">
        <button class="tbtn" data-tool="text" data-tip="Text  T" onclick="setTool('text')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          <span class="k">T</span>
        </button>
        <button class="tbtn" data-tool="pen" data-tip="Draw  P" onclick="setTool('pen')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
          <span class="k">P</span>
        </button>
        <button class="tbtn" data-tool="highlight" data-tip="Highlight  H" onclick="setTool('highlight')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l-1 9 7-5-6-4z"/><rect x="3" y="3" width="18" height="5" rx="1"/></svg>
          <span class="k">H</span>
        </button>
        <button class="tbtn" data-tool="rect" data-tip="Rectangle  R" onclick="setTool('rect')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          <span class="k">R</span>
        </button>
      </div>
      <div class="tg">
        <button class="tbtn" data-tool="eraser" data-tip="Eraser  E" onclick="setTool('eraser')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-11 8 9-2 3 2 3z"/></svg>
          <span class="k">E</span>
        </button>
      </div>
      <div class="tg">
        <button class="tbtn" data-tip="Undo  Ctrl+Z" onclick="doUndo()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
          <span class="k">⌘Z</span>
        </button>
      </div>
    </div>

    <!-- CANVAS AREA -->
    <div class="canvas-area" id="ca">
      <div class="drop-zone" id="dz">
        <div class="drop-icon">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
        </div>
        <div class="drop-h2">Drop your PDF here</div>
        <div class="drop-p">or click to browse · <span>PDF files only</span></div>
        <button class="btn-up" onclick="pickFile()">Choose PDF</button>
        <input type="file" id="fi" accept=".pdf" style="display:none" onchange="onFilePick(event)">
      </div>
      <div class="pages gone" id="pg"></div>
    </div>

    <!-- PROPS -->
    <div class="props muted" id="props">
      <div class="psec">
        <div class="plabel">Color</div>
        <div class="color-grid" id="cgrid"></div>
        <div class="crow">
          <span class="cname">Custom</span>
          <div class="swatch" id="swatchEl" style="background:#e8b44b">
            <input type="color" id="cpick" value="#e8b44b" oninput="setColor(this.value)">
          </div>
        </div>
      </div>
      <div class="psec" id="strokeSec">
        <div class="plabel">Stroke Width</div>
        <div class="rrow">
          <input type="range" id="sizeR" min="1" max="24" value="3" oninput="setSize(+this.value)">
          <span class="rval" id="sizeV">3px</span>
        </div>
      </div>
      <div class="psec gone" id="fontSec">
        <div class="plabel">Font Size</div>
        <div class="rrow">
          <input type="range" id="fontR" min="8" max="72" value="16" oninput="setFontSize(+this.value)">
          <span class="rval" id="fontV">16pt</span>
        </div>
      </div>
      <div class="psec" id="opSec">
        <div class="plabel">Opacity</div>
        <div class="rrow">
          <input type="range" id="opR" min="10" max="100" value="100" oninput="setOpacity(+this.value)">
          <span class="rval" id="opV">100%</span>
        </div>
      </div>
      <div class="psec" style="margin-top:auto">
        <div class="plabel">Guide</div>
        <div class="guide">
          <span>T</span> click to add text<br>
          <span>P</span> drag to draw<br>
          <span>H</span> drag to highlight<br>
          <span>R</span> drag for rectangle<br>
          <span>E</span> click to remove<br>
          <span>⌘Z</span> undo last
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LOADING -->
<div class="load-wrap gone" id="loader">
  <div class="spin"></div>
  <div class="load-msg" id="loadMsg">Loading...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<div class="undo-pill" id="undoPill">Undone</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ────────────────────────────────────────────────────────────────────
let pjsDoc = null, origBytes = null;
let pageData = [];  // { pjsPage, pdfC, annC, anns, scale, natH, natW }
let tool = 'select', color = '#e8b44b', size = 3, fontSize = 16, opacity = 1;
let zl = 1, drawing = false, pts = [], ds = null, activePg = -1;
let history = [];  // stack of { pageIdx, anns }

const COLORS = ['#ffffff','#e8b44b','#ef4444','#22c55e','#3b82f6','#a855f7','#f97316','#ec4899','#14b8a6','#111111'];

// ── Helpers ───────────────────────────────────────────────────────────────────
// Canvas px → normalised [0,1]
const c2n = (x, y, c) => ({ nx: x / c.width, ny: y / c.height });
// Normalised → canvas px
const n2c = (nx, ny, c) => ({ x: nx * c.width, y: ny * c.height });
// Normalised → PDF points (y flipped)
const n2p = (nx, ny, W, H) => ({ x: nx * W, y: (1 - ny) * H });
// Size in pixels → normalised (relative to canvas width)
const sn = (s, c) => s / c.width;
// Normalised size → canvas pixels
const ns = (n, c) => n * c.width;
// Normalised size → PDF points
const np = (n, W) => n * W;

function hexRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
  return PDFLib.rgb(parseInt(hex.slice(0,2),16)/255, parseInt(hex.slice(2,4),16)/255, parseInt(hex.slice(4,6),16)/255);
}

function getPos(e, canvas) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (canvas.width / r.width), y: (e.clientY - r.top) * (canvas.height / r.height) };
}

// ── Init ─────────────────────────────────────────────────────────────────────
function init() {
  // Colour grid
  const grid = document.getElementById('cgrid');
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'cdot' + (c === color ? ' on' : '');
    d.style.background = c;
    d.onclick = () => { setColor(c); document.querySelectorAll('.cdot').forEach(x=>x.classList.remove('on')); d.classList.add('on'); };
    grid.appendChild(d);
  });

  // Drop zone
  const dz = document.getElementById('dz');
  const ca = document.getElementById('ca');
  dz.addEventListener('click', e => { if (!e.target.matches('button')) pickFile(); });
  ca.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  ca.addEventListener('dragleave', () => dz.classList.remove('drag'));
  ca.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); const f=e.dataTransfer.files[0]; f&&f.type==='application/pdf'?loadPDF(f):toast('Please drop a PDF file'); });

  document.addEventListener('keydown', e => {
    if (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
    const m = {v:'select',t:'text',p:'pen',h:'highlight',r:'rect',e:'eraser'};
    if (m[e.key.toLowerCase()]) setTool(m[e.key.toLowerCase()]);
    if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); doUndo(); }
  });

  updateProps();
}

// ── File Load ─────────────────────────────────────────────────────────────────
function pickFile() { document.getElementById('fi').click(); }
function onFilePick(e) { const f=e.target.files[0]; if(f) loadPDF(f); }

async function loadPDF(file) {
  showLoad('Loading PDF…');
  try {
    const ab = await file.arrayBuffer();
    origBytes = ab.slice();
    pjsDoc = await pdfjsLib.getDocument({ data: new Uint8Array(ab) }).promise;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('pageInfo').textContent = pjsDoc.numPages + ' page' + (pjsDoc.numPages>1?'s':'');
    document.getElementById('pageInfo').style.display = '';
    document.getElementById('btnDl').disabled = false;
    document.getElementById('props').classList.remove('muted');
    document.getElementById('dz').classList.add('gone');
    document.getElementById('pg').classList.remove('gone');
    await renderPages();
    hideLoad();
    toast('Loaded: ' + file.name);
  } catch(err) {
    hideLoad(); toast('Failed to load PDF.'); console.error(err);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
async function renderPages() {
  const pg = document.getElementById('pg');
  const saved = pageData.map(p => p.anns);
  pg.innerHTML = '';
  pageData = [];
  const maxW = document.getElementById('ca').clientWidth - 64;

  for (let i = 1; i <= pjsDoc.numPages; i++) {
    showLoad(`Rendering page ${i}/${pjsDoc.numPages}…`);
    const page = await pjsDoc.getPage(i);
    const nat = page.getViewport({ scale: 1 });
    const scale = Math.min((maxW / nat.width) * zl, 4);
    const vp = page.getViewport({ scale });

    const wrap = document.createElement('div');
    wrap.className = 'page-wrap';
    wrap.style.cssText = `width:${vp.width}px;height:${vp.height}px`;

    const pdfC = document.createElement('canvas');
    pdfC.className = 'pdf-c'; pdfC.width = vp.width; pdfC.height = vp.height;

    const annC = document.createElement('canvas');
    annC.className = `ac tool-${tool}`; annC.width = vp.width; annC.height = vp.height;

    const lbl = document.createElement('div');
    lbl.className = 'page-label'; lbl.textContent = `Page ${i}`;

    wrap.append(pdfC, annC, lbl);
    pg.appendChild(wrap);

    await page.render({ canvasContext: pdfC.getContext('2d'), viewport: vp }).promise;

    const idx = i - 1;
    pageData.push({ pjsPage: page, pdfC, annC, anns: saved[idx] || [], scale, natH: nat.height, natW: nat.width });
    attachEvents(annC, idx);
    redraw(idx);
  }
}

// ── Events ────────────────────────────────────────────────────────────────────
function attachEvents(canvas, idx) {
  canvas.addEventListener('mousedown', e => onDown(e, idx));
  canvas.addEventListener('mousemove', e => onMove(e, idx));
  canvas.addEventListener('mouseup',   e => onUp(e, idx));
  canvas.addEventListener('mouseleave',e => { if(drawing && activePg===idx) onUp(e, idx); });
}

function onDown(e, idx) {
  if (tool==='select') return;
  const pos = getPos(e, pageData[idx].annC);
  activePg = idx;
  if (tool==='text') { spawnText(pos, idx); return; }
  if (tool==='eraser') { erase(pos, idx); return; }
  drawing = true; ds = pos; pts = [pos];
}

function onMove(e, idx) {
  if (!drawing || activePg!==idx) return;
  const pos = getPos(e, pageData[idx].annC);
  if (tool==='pen') { pts.push(pos); redraw(idx); drawLivePath(idx); }
  else if (tool==='highlight'||tool==='rect') { redraw(idx); drawPreview(idx, pos); }
}

function onUp(e, idx) {
  if (!drawing || activePg!==idx) return;
  drawing = false;
  const pos = getPos(e, pageData[idx].annC);
  const { annC, anns, natW, natH } = pageData[idx];
  pushHistory(idx);

  if (tool==='pen' && pts.length >= 2) {
    anns.push({ type:'path', pts: pts.map(p => c2n(p.x, p.y, annC)), color, nw: sn(size, annC), opacity });
  } else if (tool==='highlight') {
    const x=Math.min(ds.x,pos.x), y=Math.min(ds.y,pos.y);
    const w=Math.abs(pos.x-ds.x), h=Math.abs(pos.y-ds.y);
    if (w>5&&h>5) {
      const a=c2n(x,y,annC), b=c2n(x+w,y+h,annC);
      anns.push({ type:'highlight', nx:a.nx, ny:a.ny, nw:b.nx-a.nx, nh:b.ny-a.ny, color, opacity: opacity*0.42 });
    }
  } else if (tool==='rect') {
    const x=Math.min(ds.x,pos.x), y=Math.min(ds.y,pos.y);
    const w=Math.abs(pos.x-ds.x), h=Math.abs(pos.y-ds.y);
    if (w>5&&h>5) {
      const a=c2n(x,y,annC), b=c2n(x+w,y+h,annC);
      anns.push({ type:'rect', nx:a.nx, ny:a.ny, nw:b.nx-a.nx, nh:b.ny-a.ny, color, nstroke: sn(size,annC), opacity });
    }
  }
  pts=[]; ds=null; redraw(idx);
}

// ── Draw Layer ────────────────────────────────────────────────────────────────
function redraw(idx) {
  const { annC, anns } = pageData[idx];
  const ctx = annC.getContext('2d');
  ctx.clearRect(0, 0, annC.width, annC.height);
  for (const a of anns) drawAnn(ctx, a, annC);
}

function drawAnn(ctx, a, canvas) {
  ctx.save();
  if (a.type === 'path') {
    if (a.pts.length < 2) { ctx.restore(); return; }
    ctx.globalAlpha = a.opacity;
    ctx.strokeStyle = a.color; ctx.lineWidth = ns(a.nw, canvas);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    const f = n2c(a.pts[0].nx, a.pts[0].ny, canvas);
    ctx.moveTo(f.x, f.y);
    for (let i=1;i<a.pts.length;i++) { const p=n2c(a.pts[i].nx, a.pts[i].ny, canvas); ctx.lineTo(p.x, p.y); }
    ctx.stroke();
  } else if (a.type === 'text') {
    ctx.globalAlpha = a.opacity;
    ctx.fillStyle = a.color;
    const { x, y } = n2c(a.nx, a.ny, canvas);
    const fPx = ns(a.nfont, canvas);
    ctx.font = `${fPx}px DM Mono, monospace`;
    const lines = a.text.split('\n');
    lines.forEach((l,i) => ctx.fillText(l, x, y + i * fPx * 1.25));
  } else if (a.type === 'highlight') {
    ctx.globalAlpha = a.opacity;
    ctx.fillStyle = a.color;
    const { x, y } = n2c(a.nx, a.ny, canvas);
    ctx.fillRect(x, y, a.nw * canvas.width, a.nh * canvas.height);
  } else if (a.type === 'rect') {
    ctx.globalAlpha = a.opacity;
    ctx.strokeStyle = a.color; ctx.lineWidth = ns(a.nstroke, canvas);
    const { x, y } = n2c(a.nx, a.ny, canvas);
    ctx.strokeRect(x, y, a.nw * canvas.width, a.nh * canvas.height);
  }
  ctx.restore();
}

function drawLivePath(idx) {
  const { annC } = pageData[idx];
  const ctx = annC.getContext('2d');
  if (pts.length < 2) return;
  ctx.save(); ctx.globalAlpha = opacity;
  ctx.strokeStyle = color; ctx.lineWidth = size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke(); ctx.restore();
}

function drawPreview(idx, pos) {
  const { annC } = pageData[idx];
  const ctx = annC.getContext('2d');
  const x=Math.min(ds.x,pos.x), y=Math.min(ds.y,pos.y);
  const w=Math.abs(pos.x-ds.x), h=Math.abs(pos.y-ds.y);
  ctx.save();
  if (tool==='highlight') {
    ctx.globalAlpha = opacity * 0.42; ctx.fillStyle = color; ctx.fillRect(x,y,w,h);
  } else {
    ctx.globalAlpha = opacity; ctx.strokeStyle = color; ctx.lineWidth = size;
    ctx.setLineDash([5,4]); ctx.strokeRect(x,y,w,h);
  }
  ctx.restore();
}

// ── Text Tool ─────────────────────────────────────────────────────────────────
function spawnText(pos, idx) {
  const { annC } = pageData[idx];
  const r = annC.getBoundingClientRect();
  const sx = r.width / annC.width, sy = r.height / annC.height;
  const el = document.createElement('textarea');
  el.className = 'tinput';
  el.style.left   = (r.left + pos.x * sx) + 'px';
  el.style.top    = (r.top  + pos.y * sy  - fontSize * sy) + 'px';
  el.style.fontSize = (fontSize * sx) + 'px';
  el.style.color  = color;
  document.body.appendChild(el); el.focus();

  const commit = () => {
    const txt = el.value.trim();
    if (txt) {
      pushHistory(idx);
      const n = c2n(pos.x, pos.y, annC);
      pageData[idx].anns.push({ type:'text', nx:n.nx, ny:n.ny, text:txt, nfont: sn(fontSize, annC), color, opacity });
      redraw(idx);
    }
    el.remove();
  };
  el.addEventListener('blur', commit);
  el.addEventListener('keydown', e => { if(e.key==='Escape') el.remove(); else if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();commit();} });
}

// ── Eraser ────────────────────────────────────────────────────────────────────
function erase(pos, idx) {
  const { annC, anns } = pageData[idx];
  const T = 18;
  for (let i = anns.length-1; i >= 0; i--) {
    const a = anns[i]; let hit = false;
    if (a.type==='path') {
      for (const pt of a.pts) {
        const p = n2c(pt.nx, pt.ny, annC);
        if (Math.hypot(p.x-pos.x, p.y-pos.y) < T) { hit=true; break; }
      }
    } else if (a.type==='text') {
      const p = n2c(a.nx, a.ny, annC);
      if (pos.x>=p.x-4 && pos.x<=p.x+200 && pos.y>=p.y-ns(a.nfont,annC)-4 && pos.y<=p.y+4) hit=true;
    } else {
      const p = n2c(a.nx, a.ny, annC);
      const w = a.nw * annC.width, h = a.nh * annC.height;
      if (pos.x>=p.x && pos.x<=p.x+w && pos.y>=p.y && pos.y<=p.y+h) hit=true;
    }
    if (hit) { pushHistory(idx); anns.splice(i,1); redraw(idx); toast('Annotation removed'); return; }
  }
}

// ── Undo ──────────────────────────────────────────────────────────────────────
function pushHistory(idx) {
  history.push({ idx, anns: JSON.parse(JSON.stringify(pageData[idx].anns)) });
  if (history.length > 50) history.shift();
}

function doUndo() {
  if (!history.length) return;
  const h = history.pop();
  pageData[h.idx].anns = h.anns;
  redraw(h.idx);
  const p = document.getElementById('undoPill');
  p.classList.add('show'); setTimeout(() => p.classList.remove('show'), 1400);
}

// ── Zoom ──────────────────────────────────────────────────────────────────────
function zoom(d) { setZoom(Math.max(.25, Math.min(4, zl+d)); }
function setZoom(z) {
  zl = z;
  document.getElementById('zoomVal').textContent = Math.round(z*100) + '%';
  if (pjsDoc) { showLoad('Rerendering…'); renderPages().then(hideLoad); }
}

// ── Tool & Props ──────────────────────────────────────────────────────────────
function setTool(t) {
  tool = t;
  document.querySelectorAll('.tbtn[data-tool]').forEach(b => b.classList.toggle('on', b.dataset.tool===t));
  pageData.forEach(({annC}) => { annC.className = `ac tool-${t}`; });
  updateProps();
}

function updateProps() {
  const show = id => document.getElementById(id).classList.remove('gone');
  const hide = id => document.getElementById(id).classList.add('gone');
  ['strokeSec','fontSec','opSec'].forEach(hide);
  if (['pen','rect'].includes(tool)) show('strokeSec');
  if (tool==='text') show('fontSec');
  if (['pen','highlight','rect','text'].includes(tool)) show('opSec');
}

function setColor(c) {
  color = c;
  document.getElementById('swatchEl').style.background = c;
  document.getElementById('cpick').value = c;
}

function setSize(v) { size=v; document.getElementById('sizeV').textContent=v+'px'; }
function setFontSize(v) { fontSize=v; document.getElementById('fontV').textContent=v+'pt'; }
function setOpacity(v) { opacity=v/100; document.getElementById('opV').textContent=v+'%'; }

// ── Download ──────────────────────────────────────────────────────────────────
async function doDownload() {
  showLoad('Generating PDF…');
  try {
    const doc = await PDFLib.PDFDocument.load(origBytes);
    const pages = doc.getPages();
    const font = await doc.embedFont(PDFLib.StandardFonts.Helvetica);

    for (let i=0; i<pageData.length; i++) {
      const { anns, natW, natH } = pageData[i];
      const page = pages[i];
      const { width: pW, height: pH } = page.getSize();

      for (const a of anns) {
        if (a.type==='path' && a.pts.length>=2) {
          const col = hexRgb(a.color);
          const w = np(a.nw, pW);
          for (let j=1;j<a.pts.length;j++) {
            const p1=n2p(a.pts[j-1].nx, a.pts[j-1].ny, pW, pH);
            const p2=n2p(a.pts[j].nx, a.pts[j].ny, pW, pH);
            page.drawLine({ start:{x:p1.x,y:p1.y}, end:{x:p2.x,y:p2.y}, thickness:Math.max(w,0.5), color:col, opacity:a.opacity });
          }
        } else if (a.type==='text') {
          const col = hexRgb(a.color);
          const fPt = np(a.nfont, pW);
          const { x, y } = n2p(a.nx, a.ny, pW, pH);
          const lines = a.text.split('\n');
          const lh = fPt * 1.25;
          // Check if text is within page bounds
          lines.forEach((line, li) => {
            const py = y - li * lh;
            if (py > 0 && py < pH && x >= 0 && x < pW) {
              try {
                page.drawText(line, { x, y: py, size: Math.max(fPt, 4), font, color: col, opacity: a.opacity });
              } catch(e) { /* skip invalid text */ }
            }
          });
        } else if (a.type==='highlight') {
          const col = hexRgb(a.color);
          const { x, y } = n2p(a.nx, a.ny+a.nh, pW, pH);
          page.drawRectangle({ x, y, width: a.nw*pW, height: a.nh*pH, color: col, opacity: a.opacity });
        } else if (a.type==='rect') {
          const col = hexRgb(a.color);
          const { x, y } = n2p(a.nx, a.ny+a.nh, pW, pH);
          page.drawRectangle({ x, y, width: a.nw*pW, height: a.nh*pH, borderColor: col, borderWidth: Math.max(np(a.nstroke,pW),0.5), opacity: a.opacity });
        }
      }
    }

    const bytes = await doc.save();
    const blob = new Blob([bytes], { type:'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='edited.pdf'; a.click();
    URL.revokeObjectURL(url);
    hideLoad(); toast('PDF exported successfully!');
  } catch(err) {
    hideLoad(); toast('Export failed — see console.'); console.error(err);
  }
}

// ── UI Helpers ────────────────────────────────────────────────────────────────
function showLoad(msg) { document.getElementById('loadMsg').textContent=msg; document.getElementById('loader').classList.remove('gone'); }
function hideLoad() { document.getElementById('loader').classList.add('gone'); }

let toastT;
function toast(msg) {
  const el = document.getElementById('toast'); el.textContent=msg;
  el.classList.add('up'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('up'),3000);
}

init();
</script>
